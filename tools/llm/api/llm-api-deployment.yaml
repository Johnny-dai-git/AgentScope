apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-api
  namespace: llm
  labels:
    app: llm-api
  annotations:
    # ArgoCD Image Updater configuration
    # 注意：image-list 中的别名是 llm-api，但实际使用的镜像名称是 gateway
    argocd-image-updater.argoproj.io/image-list: llm-api=ghcr.io/johnny-dai-git/llm-deployment/gateway
    argocd-image-updater.argoproj.io/llm-api.update-strategy: name
    argocd-image-updater.argoproj.io/llm-api.allow-tags: regexp:^v-[0-9]{8}-[0-9]{6}$
    argocd-image-updater.argoproj.io/write-back-method: git:secret:argocd/git-credentials
    argocd-image-updater.argoproj.io/git-branch: main
spec:
  replicas: 1                           # two replicas for HA
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: llm-api
  template:
    metadata:
      labels:
        app: llm-api
      # Prometheus 抓取由 api-servicemonitor.yaml(ServiceMonitor)负责,
      # 不再使用 prometheus.io/* annotation(kube-prometheus-stack 不读这个)
    spec:
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      nodeSelector:
        system: "true"
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - llm-api
                topologyKey: kubernetes.io/hostname
      containers:
        - name: llm-api
          image: ghcr.io/johnny-dai-git/llm-deployment/gateway:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
              - ALL
          ports:
            - name: http
              containerPort: 8000       # API server inside container
              protocol: TCP

          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1.5"
              memory: "1536Mi"

          # Common environment variables (optional)
          # llm-api 直接转发到 vllm-worker(原 router 已合并到 llm-api)
          env:
            - name: VLLM_WORKER_HOST
              value: "vllm-worker-service.llm.svc.cluster.local"
            - name: VLLM_WORKER_PORT
              value: "8002"
            - name: WORKER_TIMEOUT
              value: "300"
            - name: LOG_LEVEL
              value: "info"
            - name: RATE_LIMIT_QPS
              value: "20"

          # ========= Probes =========
          # FastAPI 启动很快(<2s),但加 startupProbe 给一致性 +
          # 容忍 Python 依赖偶尔卡顿
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 2
            periodSeconds: 3
            timeoutSeconds: 3
            failureThreshold: 10        # ~30s 启动预算

          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
