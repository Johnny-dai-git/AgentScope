apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-web
  namespace: llm
  labels:
    app: llm-web
  annotations:
    # ArgoCD Image Updater configuration
    argocd-image-updater.argoproj.io/image-list: web=ghcr.io/johnny-dai-git/llm-deployment/web
    argocd-image-updater.argoproj.io/web.update-strategy: name
    argocd-image-updater.argoproj.io/web.allow-tags: regexp:^v-[0-9]{8}-[0-9]{6}$
    argocd-image-updater.argoproj.io/write-back-method: git:secret:argocd/git-credentials
    argocd-image-updater.argoproj.io/git-branch: main
spec:
  replicas: 1                 # Two replicas for HA
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: llm-web
  template:
    metadata:
      labels:
        app: llm-web
      # llm-web 是静态 nginx,不暴露 Prometheus 指标。
      # 如果未来要采集 nginx 指标,需要加 nginx-prometheus-exporter sidecar
      # 然后给它写一个 ServiceMonitor。当前不需要。
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      nodeSelector:
        system: "true"
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - llm-web
                topologyKey: kubernetes.io/hostname
      volumes:
        - name: nginx-run
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-tmp
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: llm-web-nginx-config
      containers:
        - name: llm-web
          image: ghcr.io/johnny-dai-git/llm-deployment/web:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
              - ALL
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: nginx-run
              mountPath: /var/run
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-tmp
              mountPath: /tmp
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
          # ========= Probes =========
          # nginx 启动 < 500ms,startupProbe 大部分时候是冗余的;
          # 加它是为了:
          #   1) 跟其他组件配置形状一致
          #   2) 防御 ConfigMap 挂载偶尔慢的边缘情况
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 3
            timeoutSeconds: 3
            failureThreshold: 5          # ~15s 启动预算

          readinessProbe:
            httpGet:
              path: /
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
