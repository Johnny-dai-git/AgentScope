apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-worker
  namespace: llm
  labels:
    app: vllm-worker
  annotations:
    argocd-image-updater.argoproj.io/image-list: vllm-worker=ghcr.io/johnny-dai-git/llm-deployment/vllm-worker
    argocd-image-updater.argoproj.io/vllm-worker.update-strategy: name
    argocd-image-updater.argoproj.io/vllm-worker.allow-tags: regexp:^v-[0-9]{8}-[0-9]{6}$
    argocd-image-updater.argoproj.io/write-back-method: git:secret:argocd/git-credentials
    argocd-image-updater.argoproj.io/git-branch: main

spec:
  # 初始 1 副本,实际由 HPA(vllm-hpa.yaml)按队列深度动态调整 1↔2
  # HPA 一旦运行后会接管这个字段,不要手动改 replicas
  # 上限 2 来自 GPU time-slicing 切 2 份;Lambda 多 GPU 时改 HPA maxReplicas
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: vllm-worker

  template:
    metadata:
      labels:
        app: vllm-worker
      # Prometheus 抓取由 vllm-servicemonitor.yaml(ServiceMonitor)负责,
      # 不再使用 prometheus.io/* annotation(kube-prometheus-stack 不读这个)

    spec:
      runtimeClassName: nvidia
      terminationGracePeriodSeconds: 120
      nodeSelector:
        gpu-node: "true"

      containers:
      - name: vllm
        image: ghcr.io/johnny-dai-git/llm-deployment/vllm-worker:latest
        imagePullPolicy: IfNotPresent

        ports:
        - name: http
          containerPort: 8002
          protocol: TCP

        resources:
          # 资源调优记录:
          # - qwen2.5-0.5b 实测 host RAM 用量约 3 GB(Python + vLLM + 模型 buffer)
          # - GPU time-slicing 把 1 张物理卡切成 2 份,HPA 上限 2 副本
          # - 笔记本节点 30 GB 总 RAM,2 × 4Gi requests = 8Gi,留足 buffer
          # - 上 Lambda(独占 GPU + 大模型)时调回 16Gi 或更高
          requests:
            nvidia.com/gpu: 1
            cpu: "1"
            memory: "4Gi"
          limits:
            nvidia.com/gpu: 1
            cpu: "2"
            memory: "8Gi"

        command:
          - python3
          - -m
          - vllm.entrypoints.openai.api_server

        args:
          # ========= 模型 =========
          - --model=/model/qwen2.5-0.5b
          - --served-model-name=qwen2.5-0.5b

          # ========= 服务监听 =========
          - --host=0.0.0.0
          - --port=8002

          # ========= 稳定参数（已本地验证） =========
          - --dtype=float16
          # 0.4:6 GB GPU 切 2 份后,每份 ~2.4 GB,够装 0.5B 模型 + KV cache
          # 上 Lambda 单 Pod 独占 GPU 时改回 0.8 或更高
          - --gpu-memory-utilization=0.4
          - --max-model-len=2048
          - --max-num-seqs=8
          - --max-num-batched-tokens=2048

          # ========= 关键：避免 Flash / CUDA Graph 崩溃 =========
          - --disable-cascade-attn
          - --enforce-eager

        volumeMounts:
        - name: model-volume
          mountPath: /model

        # ========= Probes =========
        # vLLM 的 OpenAI server 暴露两个我们关心的端点:
        #   /health      —— 进程级活性 (HTTP 200 = uvicorn 在跑)
        #   /v1/models   —— 模型加载就绪后才返回 200
        #
        # 设计原则:
        #   - startup/readiness 都用 /v1/models -> 等模型真就绪才放流量
        #   - liveness 用 /health -> 进程活着即可,避免因为单次推理卡顿
        #     就把整个 GPU Pod 杀掉重启(代价大)
        startupProbe:
          httpGet:
            path: /v1/models
            port: 8002
          initialDelaySeconds: 30        # 给模型加载留出冷启动时间
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 30           # 30 * 10s = 5 分钟加载预算
                                         # qwen2.5-0.5b 几秒搞定;
                                         # 7B+ 模型可调高到 60+

        readinessProbe:
          httpGet:
            path: /v1/models
            port: 8002
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
          # readiness 失败 -> Pod 暂时从 Endpoints 摘掉,不接流量

        livenessProbe:
          httpGet:
            path: /health
            port: 8002
          periodSeconds: 30              # 不频繁,GPU Pod 重启代价大
          timeoutSeconds: 5
          failureThreshold: 3
          # liveness 失败 -> Pod 重启(慎用,会触发模型重新加载)

      volumes:
      - name: model-volume
        hostPath:
          # 本地开发环境路径(Johnny 笔记本)
          # 容器内挂载到 /model,vLLM 启动参数 --model=/model/qwen2.5-0.5b
          # 所以这个目录下要有 qwen2.5-0.5b/ 子目录(放模型权重文件)
          # 上 Lambda 时改成 /home/ubuntu/k8s/model
          path: /home/johnny/Desktop/projects/llm-server/models
          type: DirectoryOrCreate
