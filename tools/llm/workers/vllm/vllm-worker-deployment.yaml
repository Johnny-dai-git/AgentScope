apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-worker
  namespace: llm
  labels:
    app: vllm-worker
  annotations:
    argocd-image-updater.argoproj.io/image-list: vllm-worker=ghcr.io/johnny-dai-git/llm-deployment/vllm-worker
    argocd-image-updater.argoproj.io/vllm-worker.update-strategy: name
    argocd-image-updater.argoproj.io/vllm-worker.allow-tags: regexp:^v-[0-9]{8}-[0-9]{6}$
    argocd-image-updater.argoproj.io/write-back-method: git:secret:argocd/git-credentials
    argocd-image-updater.argoproj.io/git-branch: main

spec:
  # Initial 1 replica, actual dynamically adjusted by HPA (vllm-hpa.yaml) based on queue depth
  # Once HPA runs, it takes over this field, do not manually change replicas
  # Limit of 2 comes from GPU time-slicing split into 2 parts; change HPA maxReplicas for multiple Lambda GPUs
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: vllm-worker

  template:
    metadata:
      labels:
        app: vllm-worker
      # Prometheus scraping is handled by vllm-servicemonitor.yaml (ServiceMonitor),
      # no longer use prometheus.io/* annotation (kube-prometheus-stack doesn't read this)

    spec:
      runtimeClassName: nvidia
      terminationGracePeriodSeconds: 120
      nodeSelector:
        gpu-node: "true"

      containers:
      - name: vllm
        image: ghcr.io/johnny-dai-git/llm-deployment/vllm-worker:latest
        imagePullPolicy: IfNotPresent

        ports:
        - name: http
          containerPort: 8002
          protocol: TCP

        resources:
          # Lambda Labs A100 (40 GB) + MIG 1g.5gb sizing:
          # - Each MIG 1g.5gb instance gives 5 GB VRAM and 1/7 of A100 SMs.
          # - Qwen2.5-0.5B fp16 weights ~1 GB; the rest of VRAM is KV cache.
          # - Host RAM on the Lambda 1×A100 instance is plentiful (216 GB);
          #   keeping the same 4Gi/8Gi values as the laptop branch keeps
          #   per-pod RAM small so HPA can pack 7 replicas on a single
          #   GPU node without RAM contention.
          requests:
            nvidia.com/gpu: 1
            cpu: "1"
            memory: "4Gi"
          limits:
            nvidia.com/gpu: 1
            cpu: "2"
            memory: "8Gi"

        command:
          - python3
          - -m
          - vllm.entrypoints.openai.api_server

        args:
          # ========= Model =========
          # Same model as the laptop branch (Qwen2.5-0.5B fp16) so the
          # before/after comparison is purely about hardware:
          # laptop RTX 4050 + software time-slicing → Lambda Labs A100 + hardware MIG.
          - --model=/model/qwen2.5-0.5b
          - --served-model-name=qwen2.5-0.5b

          # ========= Server =========
          - --host=0.0.0.0
          - --port=8002

          # ========= Inference settings =========
          - --dtype=float16
          # 0.85 of a 5 GB MIG slice = ~4.25 GB usable
          # (1 GB weights + 3 GB KV cache + headroom)
          - --gpu-memory-utilization=0.85
          - --max-model-len=2048
          - --max-num-seqs=8
          - --max-num-batched-tokens=2048

          # On A100 we let vLLM use its preferred backends — FlashAttention 2,
          # CUDA Graph, cascade attention are all stable on data-center cards.
          # The laptop branch had to defensively disable these to survive a
          # consumer RTX 4050; not needed here.

        volumeMounts:
        - name: model-volume
          mountPath: /model

        # ========= Probes =========
        # vLLM's OpenAI server exposes two endpoints we care about:
        #   /health      —— process-level liveness (HTTP 200 = uvicorn is running)
        #   /v1/models   —— return 200 only after model loading is ready
        #
        # Design principles:
        #   - startup/readiness both use /v1/models -> wait for model truly ready before traffic
        #   - liveness use /health -> process alive is enough, avoid killing entire GPU Pod
        #     and restarting due to single inference stall (costly)
        startupProbe:
          httpGet:
            path: /v1/models
            port: 8002
          initialDelaySeconds: 30        # Reserve time for model loading cold start
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 30           # 30 * 10s = 5 minute loading budget
                                         # qwen2.5-0.5b finishes in seconds;
                                         # 7B+ models can increase to 60+

        readinessProbe:
          httpGet:
            path: /v1/models
            port: 8002
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
          # readiness failure -> Pod temporarily removed from Endpoints, no traffic

        livenessProbe:
          httpGet:
            path: /health
            port: 8002
          periodSeconds: 30              # Not frequent, GPU Pod restart cost is high
          timeoutSeconds: 5
          failureThreshold: 3
          # liveness failure -> Pod restart (use cautiously, triggers model reload)

      volumes:
      # Lambda Labs (single-node bare A100): model weights live on the
      # host filesystem at /mnt/models, mounted into every vllm-worker
      # pod via hostPath. Because all 7 MIG-backed pods land on the
      # same physical node, hostPath is sufficient — no need for a
      # network-attached store.
      #
      # download-model.sh fetches Qwen2.5-0.5B-Instruct here once;
      # subsequent pod restarts hit the local cache and start in seconds.
      #
      # If this branch is ever retargeted to a multi-node cloud cluster,
      # swap this block for a network-attached PV (NFS / EBS / GCS Fuse
      # / Azure Files) so all GPU nodes share one model copy.
      - name: model-volume
        hostPath:
          path: /mnt/models
          type: DirectoryOrCreate
