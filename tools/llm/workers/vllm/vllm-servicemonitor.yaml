apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: vllm-worker
  namespace: llm
  labels:
    app: vllm-worker
spec:
  # Service selector: match vllm-worker-service (metadata.labels.app: vllm-worker)
  selector:
    matchLabels:
      app: vllm-worker
  namespaceSelector:
    matchNames:
      - llm
  endpoints:
    - port: http              # Reference Service's named port (8002)
      path: /metrics          # vLLM's built-in OpenAI server exposes rich metrics:
                              #   vllm:e2e_request_latency_seconds
                              #   vllm:time_to_first_token_seconds
                              #   vllm:gpu_cache_usage_perc
                              #   vllm:num_requests_running / waiting
                              #   vllm:request_prompt_tokens / generation_tokens
      interval: 15s
      scrapeTimeout: 10s
      honorLabels: false
