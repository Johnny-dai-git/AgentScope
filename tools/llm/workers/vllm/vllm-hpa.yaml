apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vllm-worker
  namespace: llm
  labels:
    app: vllm-worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vllm-worker
  minReplicas: 1
  maxReplicas: 2                  # ⚠️ 笔记本 GPU time-slicing 切 2 份
                                  # 上限就 2,第 3 个 Pod 会 Pending
                                  # 上 Lambda H100/A100 后改成 4 / 8
  metrics:
    # ============ 主指标:vLLM 内部等待队列深度 ============
    # 由 prometheus-adapter 暴露(见 tools/helm/monitoring/prometheus-adapter-values.yaml)
    # 平均每个 Pod 等待中的请求数 > 5 → 扩容
    #
    # 为什么用这个不用 CPU:GPU 推理服务的瓶颈在 GPU,
    # CPU 利用率往往很低,不能反映真实压力
    - type: Pods
      pods:
        metric:
          name: vllm_num_requests_waiting
        target:
          type: AverageValue
          averageValue: "5"
  behavior:
    # ============ 扩容策略 ============
    # GPU 模型加载慢(冷启动 30-60 秒),不能太激进:
    # stabilizationWindow: 60 秒平均,避免瞬时高峰
    # 每 2 分钟最多扩 1 个 Pod,给新 Pod 留时间加载模型
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
      selectPolicy: Max
    # ============ 缩容策略 ============
    # GPU Pod 重启代价大(模型重新加载),不能太激进:
    # stabilizationWindow: 10 分钟平均才缩容
    # 每 5 分钟最多缩 1 个,温和
    scaleDown:
      stabilizationWindowSeconds: 600
      policies:
        - type: Pods
          value: 1
          periodSeconds: 300
      selectPolicy: Max
