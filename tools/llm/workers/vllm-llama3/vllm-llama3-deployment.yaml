# vllm-llama3 — Llama-3.2-3B-Instruct on the time-sliced 1g.10gb pool
#
# Bound to one of 8 schedulable slots on the 2× 1g.10gb MIG instances.
# Coexists with vllm-qwen-small and vllm-tinyllama via software time-slicing.
#
# 3B fp16 is ~6 GB — fits in 10 GB with room for a small KV cache.
# Tighten max_model_len if you see OOM during heavy concurrent load.
#
# Model weights must exist at /mnt/models/llama-3.2-3b-instruct/.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-llama3
  namespace: llm
  labels:
    app: vllm-llama3
    vllm.role: small-model
  annotations:
    argocd-image-updater.argoproj.io/image-list: vllm-llama3=ghcr.io/johnny-dai-git/llm-deployment/vllm-llama3
    argocd-image-updater.argoproj.io/vllm-llama3.update-strategy: name
    argocd-image-updater.argoproj.io/vllm-llama3.allow-tags: regexp:^v-[0-9]{8}-[0-9]{6}$
    argocd-image-updater.argoproj.io/write-back-method: argocd
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: vllm-llama3
  template:
    metadata:
      labels:
        app: vllm-llama3
        vllm.role: small-model
    spec:
      runtimeClassName: nvidia
      terminationGracePeriodSeconds: 60
      nodeSelector:
        gpu-node: "true"
      containers:
      - name: vllm
        image: ghcr.io/johnny-dai-git/llm-deployment/vllm-llama3:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8002
          protocol: TCP
        resources:
          requests:
            nvidia.com/mig-1g.10gb: 1
            cpu: "500m"
            memory: "4Gi"
          limits:
            nvidia.com/mig-1g.10gb: 1
            cpu: "2"
            memory: "8Gi"
        command:
          - python3
          - -m
          - vllm.entrypoints.openai.api_server
        args:
          - --model=/model/llama-3.2-3b-instruct
          - --served-model-name=llama-3.2-3b
          - --host=0.0.0.0
          - --port=8002
          - --dtype=float16
          # 0.85 of 10 GB = ~8.5 GB. 3B fp16 weights ~6 GB → ~2.5 GB
          # KV cache. Tight but workable for low-concurrency calls.
          - --gpu-memory-utilization=0.85
          - --max-model-len=2048
          - --max-num-seqs=4
          - --max-num-batched-tokens=2048
        volumeMounts:
        - name: model-volume
          mountPath: /model
        startupProbe:
          httpGet:
            path: /v1/models
            port: 8002
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 36
        readinessProbe:
          httpGet:
            path: /v1/models
            port: 8002
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8002
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
      volumes:
      - name: model-volume
        hostPath:
          path: /mnt/models
          type: DirectoryOrCreate
