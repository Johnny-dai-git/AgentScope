# vllm-tinyllama — TinyLlama-1.1B-Chat on the time-sliced 1g.10gb pool
#
# Bound to one of 8 schedulable slots on the 2× 1g.10gb MIG instances.
# Coexists with vllm-qwen-small and vllm-llama3 via software time-slicing.
#
# Model weights must exist at /mnt/models/tinyllama-1.1b-chat/.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-tinyllama
  namespace: llm
  labels:
    app: vllm-tinyllama
    vllm.role: small-model
  annotations:
    argocd-image-updater.argoproj.io/image-list: vllm-tinyllama=ghcr.io/johnny-dai-git/llm-deployment/vllm-tinyllama
    argocd-image-updater.argoproj.io/vllm-tinyllama.update-strategy: name
    argocd-image-updater.argoproj.io/vllm-tinyllama.allow-tags: regexp:^v-[0-9]{8}-[0-9]{6}$
    argocd-image-updater.argoproj.io/write-back-method: argocd
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: vllm-tinyllama
  template:
    metadata:
      labels:
        app: vllm-tinyllama
        vllm.role: small-model
    spec:
      runtimeClassName: nvidia
      terminationGracePeriodSeconds: 60
      nodeSelector:
        gpu-node: "true"
      containers:
      - name: vllm
        image: ghcr.io/johnny-dai-git/llm-deployment/vllm-tinyllama:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8002
          protocol: TCP
        resources:
          requests:
            nvidia.com/mig-1g.10gb: 1
            cpu: "500m"
            memory: "2Gi"
          limits:
            nvidia.com/mig-1g.10gb: 1
            cpu: "2"
            memory: "6Gi"
        command:
          - python3
          - -m
          - vllm.entrypoints.openai.api_server
        args:
          - --model=/model/tinyllama-1.1b-chat
          - --served-model-name=tinyllama-1.1b
          - --host=0.0.0.0
          - --port=8002
          - --dtype=float16
          - --gpu-memory-utilization=0.7
          - --max-model-len=2048
          - --max-num-seqs=8
          - --max-num-batched-tokens=2048
        volumeMounts:
        - name: model-volume
          mountPath: /model
        startupProbe:
          httpGet:
            path: /v1/models
            port: 8002
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 30
        readinessProbe:
          httpGet:
            path: /v1/models
            port: 8002
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8002
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
      volumes:
      - name: model-volume
        hostPath:
          path: /mnt/models
          type: DirectoryOrCreate
