# vllm-qwen14b — large-model worker (exclusive 3g.40gb MIG instance)
#
# This pod gets the entire 3g.40gb MIG slice to itself:
#   - 40 GB VRAM           (Qwen2.5-14B fp16 weights ~28 GB + KV cache)
#   - 3 GPCs (~half the SMs of an A100)
#   - hardware isolation from the 7B and small-models pods
#
# Model weights must exist on the host at /mnt/models/qwen2.5-14b/
# before this Deployment will become Ready. Extend
# script/lambda/download-model.sh to fetch them.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-qwen14b
  namespace: llm
  labels:
    app: vllm-qwen14b
    vllm.role: large-model
  annotations:
    argocd-image-updater.argoproj.io/image-list: vllm-qwen14b=ghcr.io/johnny-dai-git/llm-deployment/vllm-qwen14b
    argocd-image-updater.argoproj.io/vllm-qwen14b.update-strategy: name
    argocd-image-updater.argoproj.io/vllm-qwen14b.allow-tags: regexp:^v-[0-9]{8}-[0-9]{6}$
    argocd-image-updater.argoproj.io/write-back-method: argocd
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: vllm-qwen14b
  template:
    metadata:
      labels:
        app: vllm-qwen14b
        vllm.role: large-model
    spec:
      runtimeClassName: nvidia
      terminationGracePeriodSeconds: 120
      nodeSelector:
        gpu-node: "true"
      containers:
      - name: vllm
        image: ghcr.io/johnny-dai-git/llm-deployment/vllm-qwen14b:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8002
          protocol: TCP
        resources:
          # Exclusive 3g.40gb MIG slice (40 GB VRAM, 3 GPCs)
          requests:
            nvidia.com/mig-3g.40gb: 1
            cpu: "2"
            memory: "32Gi"
          limits:
            nvidia.com/mig-3g.40gb: 1
            cpu: "4"
            memory: "48Gi"
        command:
          - python3
          - -m
          - vllm.entrypoints.openai.api_server
        args:
          - --model=/model/qwen2.5-14b
          - --served-model-name=qwen2.5-14b
          - --host=0.0.0.0
          - --port=8002
          - --dtype=float16
          # 0.9 of 40 GB = ~36 GB usable
          # (~28 GB weights + ~6 GB KV cache + headroom)
          - --gpu-memory-utilization=0.9
          - --max-model-len=4096
          - --max-num-seqs=16
          - --max-num-batched-tokens=4096
        volumeMounts:
        - name: model-volume
          mountPath: /model
        startupProbe:
          httpGet:
            path: /v1/models
            port: 8002
          # 14B fp16 = ~28 GB to load → 60-120s on hot cache, longer cold
          initialDelaySeconds: 60
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 40       # 40 * 15s = 10-minute loading budget
        readinessProbe:
          httpGet:
            path: /v1/models
            port: 8002
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8002
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
      volumes:
      - name: model-volume
        hostPath:
          path: /mnt/models
          type: DirectoryOrCreate
