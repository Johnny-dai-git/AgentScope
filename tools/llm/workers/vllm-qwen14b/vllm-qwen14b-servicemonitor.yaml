apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: vllm-qwen14b
  namespace: llm
  labels:
    app: vllm-qwen14b
    vllm.role: large-model
spec:
  selector:
    matchLabels:
      app: vllm-qwen14b
  namespaceSelector:
    matchNames:
      - llm
  endpoints:
    - port: http
      path: /metrics       # vLLM's built-in OpenAI server exposes:
                           #   vllm:e2e_request_latency_seconds
                           #   vllm:time_to_first_token_seconds
                           #   vllm:gpu_cache_usage_perc
                           #   vllm:num_requests_running / waiting
                           #   vllm:request_prompt_tokens / generation_tokens
      interval: 15s
      scrapeTimeout: 10s
      honorLabels: false
