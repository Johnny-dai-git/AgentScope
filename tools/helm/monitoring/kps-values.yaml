# kube-prometheus-stack Helm Values
# Demo 场景：子路径 + Ingress + IP 可变
#
# ============================================================================
# Eviction protection (双管齐下):
#   1. priorityClassName: monitoring-critical (value=100000)
#      → 节点压力下,kubelet 优先 evict workload pod 不动监控
#   2. requests == limits  (Guaranteed QoS)
#      → kubelet 在 evict 时,Guaranteed 是最后一档(BestEffort < Burstable < Guaranteed)
#
# 两个机制组合:监控组件几乎只有节点真死/失联才会受影响,普通负载尖峰打不坏。
# 见: tools/helm/monitoring/priority-classes.yaml (需要先 kubectl apply)
# ============================================================================

# =======================
# Grafana
# =======================
grafana:
  enabled: true

  # ============ Eviction protection ============
  priorityClassName: monitoring-critical

  # Guaranteed QoS:requests = limits → kubelet evict 优先级最低
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "500m"
      memory: "1Gi"

  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
              - key: system
                operator: In
                values:
                  - "true"

  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"

  adminUser: admin
  adminPassword: admin

  ingress:
    enabled: true
    ingressClassName: nginx
    path: /grafana
    pathType: Prefix
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "false"
      nginx.ingress.kubernetes.io/proxy-body-size: "50m"
      nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
      nginx.ingress.kubernetes.io/proxy-read-timeout: "60"

  grafana.ini:
    server:
      root_url: "%(protocol)s://%(domain)s/grafana/"
      serve_from_sub_path: true
    auth:
      # Anonymous Admin:任何人不登录直接进就是 Admin 权限
      anonymous:
        enabled: true
        org_role: Admin
      # 隐藏登录表单 + 退出菜单 → 彻底无登录页
      # 注意:此项严格禁止用于公网!仅适合本地/内网 demo
      disable_login_form: true
      disable_signout_menu: true
      basic:
        enabled: false

  persistence:
    enabled: true
    type: pvc
    accessModes:
      - ReadWriteOnce
    size: 10Gi

# =======================
# Prometheus
# =======================
prometheus:
  enabled: true

  prometheusSpec:
    # ============ Eviction protection ============
    priorityClassName: monitoring-critical

    # Guaranteed QoS:requests = limits
    resources:
      requests:
        cpu: "1"
        memory: "2Gi"
      limits:
        cpu: "1"
        memory: "2Gi"

    # Prometheus 自己处理子路径
    routePrefix: /prometheus
    externalUrl: /prometheus

    # Selector 全部放开:这是单团队/小项目的标准做法。
    # 任意 namespace 下的 ServiceMonitor / PodMonitor / PrometheusRule
    # 都会被 Prometheus 选中,不再要求带特定 label。
    # 如果以后多团队隔离,再收紧成 matchLabels: {team: foo} 之类。
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorNamespaceSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}

    podMonitorSelectorNilUsesHelmValues: false
    podMonitorNamespaceSelectorNilUsesHelmValues: false
    podMonitorSelector: {}
    podMonitorNamespaceSelector: {}

    ruleSelectorNilUsesHelmValues: false
    ruleNamespaceSelectorNilUsesHelmValues: false
    ruleSelector: {}
    ruleNamespaceSelector: {}

    retention: 30d

    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50Gi

  ingress:
    enabled: true
    ingressClassName: nginx
    paths:
      - /prometheus
    pathType: Prefix
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "false"


# =======================
# Alertmanager
# =======================
alertmanager:
  enabled: true
  alertmanagerSpec:
    # ============ Eviction protection ============
    priorityClassName: monitoring-critical

    # Guaranteed QoS:requests = limits
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "100m"
        memory: "256Mi"

    affinity:
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
                - key: system
                  operator: In
                  values:
                    - "true"
    tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"

# =======================
# Prometheus Operator (kps 自身的 controller)
# 中等优先级,这是管 Prometheus/Alertmanager CR 的中枢
# =======================
prometheusOperator:
  priorityClassName: monitoring-critical
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "100m"
      memory: "128Mi"

# =======================
# Node Exporter (DaemonSet, 每节点一个,本身就是 system-node-critical 概念)
# 给 standard 等级即可,不抢 critical
# =======================
nodeExporter:
  enabled: true

prometheus-node-exporter:
  priorityClassName: monitoring-standard
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "50m"
      memory: "64Mi"

# =======================
# Kube State Metrics
# =======================
kubeStateMetrics:
  enabled: true

kube-state-metrics:
  priorityClassName: monitoring-standard
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "50m"
      memory: "128Mi"
