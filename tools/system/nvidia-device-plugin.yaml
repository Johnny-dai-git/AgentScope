# =====================================================================
# NVIDIA Device Plugin + MIG (A100 80GB, mixed-profile layout)
# ---------------------------------------------------------------------
# This branch (GCP_BRANCH) targets Lambda Labs bare-metal A100 80GB.
# `script/lambda/all_install.sh` carves the GPU into:
#
#   1× 3g.40gb   →  Qwen 14B  (exclusive, no sharing)
#   1× 2g.20gb   →  Qwen 7B   (exclusive, no sharing)
#   2× 1g.10gb   →  small models pool (time-sliced into 4 slots each)
#
# Total GPC budget : 3+2+1+1 = 7 ✓
# Total VRAM       : 40+20+10+10 = 80 GB ✓
#
# `mixed` migStrategy exposes each profile as its own K8s resource:
#   nvidia.com/mig-3g.40gb : 1 slot   (one MIG, one pod, exclusive)
#   nvidia.com/mig-2g.20gb : 1 slot   (one MIG, one pod, exclusive)
#   nvidia.com/mig-1g.10gb : 8 slots  (two MIGs × 4 time-slicing replicas)
#
# Pods request a specific MIG profile, e.g.:
#   resources.limits.nvidia.com/mig-3g.40gb: 1
#
# Why time-slicing only on 1g.10gb:
#   Small models (Qwen 0.5B, TinyLlama 1.1B, Llama 3.2B, embeddings,
#   rerankers) are individually tiny (1–3 GB VRAM, low latency) and
#   benefit from being scheduled across the same physical MIG via
#   software time-slicing. The big models care about KV-cache stability
#   and tail latency, so they keep hardware-level isolation.
# =====================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: nvidia-device-plugin-config
  namespace: kube-system
data:
  config.yaml: |
    version: v1
    flags:
      # `mixed` strategy = each MIG profile becomes its own K8s resource
      # name (nvidia.com/mig-3g.40gb, etc). With `single` the plugin
      # would collapse everything into `nvidia.com/gpu: 1` and we'd
      # lose the ability to address profiles individually.
      migStrategy: mixed
    sharing:
      timeSlicing:
        # Don't rename — we keep the canonical nvidia.com/mig-*
        # resource names so manifests are obvious.
        renameByDefault: false
        # Only the small-model pool gets sliced. Each 1g.10gb MIG is
        # exposed as 4 schedulable slots → 2 MIGs × 4 = 8 total slots
        # for small-model pods to coexist.
        # Note: this is *software* sharing on top of hardware MIG, so
        # pods sharing the same 1g.10gb compete for its 14 SMs and 10 GB.
        # For the model sizes we put here this is fine.
        resources:
          - name: nvidia.com/mig-1g.10gb
            replicas: 4
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvidia-device-plugin-daemonset
  namespace: kube-system
spec:
  selector:
    matchLabels:
      name: nvidia-device-plugin-ds
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  template:
    metadata:
      labels:
        name: nvidia-device-plugin-ds
    spec:
      priorityClassName: system-node-critical
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule

      volumes:
        - name: device-plugin
          hostPath:
            path: /var/lib/kubelet/device-plugins

        - name: nvidia-lib
          hostPath:
            path: /usr/lib/x86_64-linux-gnu
            type: Directory

        - name: nvidia-dev
          hostPath:
            path: /dev
            type: Directory

        - name: device-plugin-config
          configMap:
            name: nvidia-device-plugin-config

      containers:
        - name: nvidia-device-plugin-ctr
          image: nvcr.io/nvidia/k8s-device-plugin:v0.15.0
          imagePullPolicy: IfNotPresent

          args:
            - --config-file=/etc/nvidia-device-plugin/config.yaml

          env:
            - name: FAIL_ON_INIT_ERROR
              value: "false"

          securityContext:
            privileged: true

          volumeMounts:
            - name: device-plugin
              mountPath: /var/lib/kubelet/device-plugins

            - name: nvidia-lib
              mountPath: /usr/lib/x86_64-linux-gnu
              readOnly: true

            - name: nvidia-dev
              mountPath: /dev

            - name: device-plugin-config
              mountPath: /etc/nvidia-device-plugin
              readOnly: true

      restartPolicy: Always
